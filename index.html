<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Evidence-based engineering consulting for risk assessment, hydrogen safety, wildfire response, and energy systems in Edmonton, Alberta." />
    <meta name="author" content="Enervate Analytics" />
    <meta property="og:title" content="Enervate Analytics | Engineering Consulting" />
    <meta property="og:description" content="Evidence-based engineering consulting for risk, safety, and energy systems." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/png" href="/assets/enervate-logo.png" />
    <style id="enervate-logo-visibility-override">
      .enervate-brand-text-contrast,
      .enervate-brand-text-contrast * {
        color: #ffffff !important;
        fill: #ffffff !important;
        opacity: 1 !important;
        text-shadow: none !important;
        -webkit-text-stroke: 0 !important;
        filter: none !important;
        font-weight: 700 !important;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: geometricPrecision;
      }

      .enervate-brand-word-match {
        color: #ffffff !important;
        fill: #ffffff !important;
        opacity: 1 !important;
        text-shadow: none !important;
        -webkit-text-stroke: 0 !important;
        filter: none !important;
        font-weight: 700 !important;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: geometricPrecision;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-D9o-qR2T.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D-V4WTKr.css">
  </head>

  <body>
    <div id="root"></div>
    <script>
      (function () {
        var brandName = "Enervate Analytics";
        var brandWords = ["Enervate", "Analytics"];

        function normalizeText(value) {
          return (value || "").replace(/\s+/g, " ").trim();
        }

        function forceSharpWhiteBrandText(element) {
          element.classList.add("enervate-brand-text-contrast");
          element.style.setProperty("color", "#ffffff", "important");
          element.style.setProperty("opacity", "1", "important");
          element.style.setProperty("text-shadow", "none", "important");
          element.style.setProperty("-webkit-text-stroke", "0", "important");
          element.style.setProperty("filter", "none", "important");
          element.style.setProperty("font-weight", "700", "important");
          element.style.setProperty("-webkit-font-smoothing", "antialiased");
          element.style.setProperty("-moz-osx-font-smoothing", "grayscale");
          element.style.setProperty("text-rendering", "geometricPrecision");
        }

        function forceBrandWordStyle(element) {
          element.classList.add("enervate-brand-word-match");
          forceSharpWhiteBrandText(element);
        }

        function copyReadableBrandStyle(source, target) {
          if (!source || !target) return;

          var style = window.getComputedStyle(source);
          [
            "font-family",
            "font-size",
            "font-style",
            "font-weight",
            "line-height",
            "letter-spacing",
            "text-transform"
          ].forEach(function (property) {
            target.style.setProperty(property, style.getPropertyValue(property), "important");
          });

          target.style.setProperty("color", "#ffffff", "important");
          target.style.setProperty("opacity", "1", "important");
          target.style.setProperty("text-shadow", "none", "important");
          target.style.setProperty("-webkit-text-stroke", "0", "important");
          target.style.setProperty("filter", "none", "important");
          target.style.setProperty("-webkit-font-smoothing", "antialiased");
          target.style.setProperty("-moz-osx-font-smoothing", "grayscale");
          target.style.setProperty("text-rendering", "geometricPrecision");
        }

        function improveLogoVisibility() {
          var containers = Array.prototype.slice.call(document.querySelectorAll("header, nav"));
          if (!containers.length) return;

          containers.forEach(function (container) {
            var textElements = Array.prototype.slice.call(container.querySelectorAll("a, span, div, p, strong, h1, h2, h3"));
            var enervateElements = [];
            var analyticsElements = [];

            textElements.forEach(function (element) {
              var text = normalizeText(element.textContent);

              if (text === brandName || (text.indexOf(brandName) !== -1 && text.length <= brandName.length + 10)) {
                forceSharpWhiteBrandText(element);

                Array.prototype.slice.call(element.querySelectorAll("span, strong, p, div, h1, h2, h3")).forEach(function (child) {
                  forceSharpWhiteBrandText(child);
                });
              }

              if (brandWords.indexOf(text) !== -1) {
                forceBrandWordStyle(element);
              }

              if (text === "Enervate") enervateElements.push(element);
              if (text === "Analytics") analyticsElements.push(element);
            });

            analyticsElements.forEach(function (analyticsElement) {
              var closestEnervate = enervateElements[0];

              if (enervateElements.length > 1) {
                closestEnervate = enervateElements.reduce(function (best, candidate) {
                  var bestDistance = Math.abs(best.getBoundingClientRect().top - analyticsElement.getBoundingClientRect().top);
                  var candidateDistance = Math.abs(candidate.getBoundingClientRect().top - analyticsElement.getBoundingClientRect().top);
                  return candidateDistance < bestDistance ? candidate : best;
                }, enervateElements[0]);
              }

              copyReadableBrandStyle(closestEnervate, analyticsElement);
            });
          });
        }

        document.addEventListener("DOMContentLoaded", improveLogoVisibility);
        window.addEventListener("load", improveLogoVisibility);

        var observer = new MutationObserver(improveLogoVisibility);
        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
