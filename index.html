<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enervate Analytics | Engineering Consulting & Energy Solutions</title>
    <meta name="description" content="Evidence-based engineering consulting for risk assessment, hydrogen safety, wildfire response, and energy systems in Edmonton, Alberta." />
    <meta name="author" content="Enervate Analytics" />
    <meta property="og:title" content="Enervate Analytics | Engineering Consulting" />
    <meta property="og:description" content="Evidence-based engineering consulting for risk, safety, and energy systems." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/png" href="/assets/enervate-logo.png" />
    <style id="enervate-site-overrides">
      .enervate-brand-text-contrast,
      .enervate-brand-text-contrast * {
        color: #ffffff !important;
        fill: #ffffff !important;
        opacity: 1 !important;
        text-shadow: none !important;
        -webkit-text-stroke: 0 !important;
        filter: none !important;
        font-weight: 700 !important;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: geometricPrecision;
      }

      .enervate-service-image-contain {
        width: 100% !important;
        height: 100% !important;
        object-fit: contain !important;
        object-position: center center !important;
        background-color: #ffffff !important;
      }

      .enervate-service-image-frame {
        background-color: #ffffff !important;
        overflow: hidden !important;
      }

      .enervate-service-background-contain {
        background-size: contain !important;
        background-position: center center !important;
        background-repeat: no-repeat !important;
        background-color: #ffffff !important;
      }

      .enervate-hide-content {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-D9o-qR2T.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-D-V4WTKr.css">
  </head>

  <body>
    <div id="root"></div>
    <script>
      (function () {
        var brandName = "Enervate Analytics";
        var brandWords = ["Enervate", "Analytics"];
        var serviceImageTitles = [
          "Climate Risk and Adaptation Feasibility Study",
          "Public Safety Site Risk Assessment and Land-Use Advisory"
        ];
        var phoneRegex = /(\+?1[\s\-.()]*)?\(?780\)?[\s\-.()]*885[\s\-.()]*4862/;

        function normalizeText(value) {
          return (value || "").replace(/\s+/g, " ").trim();
        }

        function normalizeLower(value) {
          return normalizeText(value).toLowerCase();
        }

        function hideNode(element) {
          if (!element || element === document.body || element === document.documentElement || element.id === "root") return;
          element.classList.add("enervate-hide-content");
          element.style.setProperty("display", "none", "important");
          element.style.setProperty("visibility", "hidden", "important");
        }

        function forceSharpWhiteBrandText(element) {
          element.classList.add("enervate-brand-text-contrast");
          element.style.setProperty("color", "#ffffff", "important");
          element.style.setProperty("opacity", "1", "important");
          element.style.setProperty("text-shadow", "none", "important");
          element.style.setProperty("-webkit-text-stroke", "0", "important");
          element.style.setProperty("filter", "none", "important");
          element.style.setProperty("font-weight", "700", "important");
          element.style.setProperty("-webkit-font-smoothing", "antialiased");
          element.style.setProperty("-moz-osx-font-smoothing", "grayscale");
          element.style.setProperty("text-rendering", "geometricPrecision");
        }

        function copyReadableBrandStyle(source, target) {
          if (!source || !target) return;
          var style = window.getComputedStyle(source);
          ["font-family", "font-size", "font-style", "font-weight", "line-height", "letter-spacing", "text-transform"].forEach(function (property) {
            target.style.setProperty(property, style.getPropertyValue(property), "important");
          });
          forceSharpWhiteBrandText(target);
        }

        function improveLogoVisibility() {
          Array.prototype.slice.call(document.querySelectorAll("header, nav")).forEach(function (container) {
            var textElements = Array.prototype.slice.call(container.querySelectorAll("a, span, div, p, strong, h1, h2, h3"));
            var enervateElements = [];
            var analyticsElements = [];

            textElements.forEach(function (element) {
              var text = normalizeText(element.textContent);
              if (text === brandName || (text.indexOf(brandName) !== -1 && text.length <= brandName.length + 10) || brandWords.indexOf(text) !== -1) {
                forceSharpWhiteBrandText(element);
              }
              if (text === "Enervate") enervateElements.push(element);
              if (text === "Analytics") analyticsElements.push(element);
            });

            analyticsElements.forEach(function (analyticsElement) {
              copyReadableBrandStyle(enervateElements[0], analyticsElement);
            });
          });
        }

        function forceImageContain(image) {
          image.classList.add("enervate-service-image-contain");
          image.style.setProperty("width", "100%", "important");
          image.style.setProperty("height", "100%", "important");
          image.style.setProperty("object-fit", "contain", "important");
          image.style.setProperty("object-position", "center center", "important");
          image.style.setProperty("background-color", "#ffffff", "important");
          if (image.parentElement) {
            image.parentElement.classList.add("enervate-service-image-frame");
            image.parentElement.style.setProperty("background-color", "#ffffff", "important");
            image.parentElement.style.setProperty("overflow", "hidden", "important");
          }
        }

        function forceBackgroundContain(element) {
          element.classList.add("enervate-service-background-contain");
          element.style.setProperty("background-size", "contain", "important");
          element.style.setProperty("background-position", "center center", "important");
          element.style.setProperty("background-repeat", "no-repeat", "important");
          element.style.setProperty("background-color", "#ffffff", "important");
        }

        function findServiceCard(titleElement, title) {
          var current = titleElement;
          var steps = 0;
          while (current && current !== document.body && steps < 8) {
            if (normalizeText(current.textContent).indexOf(title) !== -1 && current.querySelector && current.querySelector("img, picture, svg, [style*='background-image']")) return current;
            current = current.parentElement;
            steps += 1;
          }
          return null;
        }

        function fixServiceImageCropping() {
          var searchableElements = Array.prototype.slice.call(document.querySelectorAll("h1, h2, h3, h4, h5, h6, p, span, div, a"));
          serviceImageTitles.forEach(function (title) {
            searchableElements.forEach(function (element) {
              if (normalizeText(element.textContent) !== title) return;
              var card = findServiceCard(element, title);
              if (!card) return;
              Array.prototype.slice.call(card.querySelectorAll("img")).forEach(forceImageContain);
              Array.prototype.slice.call(card.querySelectorAll("[style*='background-image']")).forEach(forceBackgroundContain);
            });
          });
        }

        function hidePublicationContent() {
          Array.prototype.slice.call(document.querySelectorAll('a[href*="scholar.google"]')).forEach(hideNode);

          Array.prototype.slice.call(document.querySelectorAll("a, button")).forEach(function (element) {
            var text = normalizeLower(element.textContent);
            var href = normalizeLower(element.getAttribute("href") || "");
            if (text === "view publications" || text === "view our publications" || href.indexOf("scholar.google") !== -1) hideNode(element);
          });

          Array.prototype.slice.call(document.querySelectorAll("h1, h2, h3, h4, h5, h6")).forEach(function (heading) {
            var text = normalizeLower(heading.textContent);
            if (text === "peer-reviewed research" || text === "peer reviewed research") {
              var section = heading.closest && heading.closest("section");
              hideNode(section || heading.closest("article, div") || heading);
            }
          });
        }

        function closestSafePhoneBlock(element) {
          var current = element;
          var best = element;
          var steps = 0;

          while (current && current.parentElement && current.parentElement !== document.body && current.parentElement.id !== "root" && steps < 5) {
            var parent = current.parentElement;
            var parentText = normalizeText(parent.textContent);
            if (!phoneRegex.test(parentText)) break;
            if (parentText.length > 240) break;
            best = parent;
            current = parent;
            steps += 1;
          }

          return best;
        }

        function removePhoneNumberText() {
          if (!document.body || !window.NodeFilter) return;
          var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
          var textNodes = [];
          var node;

          while ((node = walker.nextNode())) {
            if (phoneRegex.test(node.nodeValue || "")) textNodes.push(node);
          }

          textNodes.forEach(function (textNode) {
            textNode.nodeValue = (textNode.nodeValue || "").replace(phoneRegex, "").replace(/\s{2,}/g, " ").trim();
          });
        }

        function hidePhoneContent() {
          Array.prototype.slice.call(document.querySelectorAll('a[href^="tel:"]')).forEach(function (link) {
            hideNode(closestSafePhoneBlock(link));
          });

          Array.prototype.slice.call(document.querySelectorAll("a, button, p, span, div, li" )).forEach(function (element) {
            var text = normalizeText(element.textContent);
            var href = normalizeText(element.getAttribute && element.getAttribute("href") || "");
            if (!phoneRegex.test(text) && !phoneRegex.test(href)) return;
            if (element.id === "root" || element === document.body) return;
            if (text.length > 240 && element.querySelector && element.querySelector("section, main, article")) return;

            hideNode(closestSafePhoneBlock(element.closest("a, button, p, li, div") || element));
          });

          Array.prototype.slice.call(document.querySelectorAll("p, span, div, li, h1, h2, h3, h4, h5, h6")).forEach(function (element) {
            var text = normalizeLower(element.textContent);
            if (text === "phone" || text === "phone:") {
              var current = element;
              var steps = 0;
              while (current && current.parentElement && current.parentElement !== document.body && current.parentElement.id !== "root" && steps < 5) {
                current = current.parentElement;
                if (phoneRegex.test(normalizeText(current.textContent)) && normalizeText(current.textContent).length < 240) {
                  hideNode(current);
                  break;
                }
                steps += 1;
              }
            }
          });

          removePhoneNumberText();
        }

        function applySiteFixes() {
          improveLogoVisibility();
          fixServiceImageCropping();
          hidePublicationContent();
          hidePhoneContent();
        }

        document.addEventListener("DOMContentLoaded", function () {
          applySiteFixes();
          setTimeout(applySiteFixes, 300);
          setTimeout(applySiteFixes, 1000);
          setTimeout(applySiteFixes, 2000);
        });
        window.addEventListener("load", applySiteFixes);
      })();
    </script>
  </body>
</html>
